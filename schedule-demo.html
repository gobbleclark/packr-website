<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#23231A">

<title>Book a Demo — Packr</title>
<meta name="description" content="30 minutes. We'll plug into your WMS sandbox and walk your real numbers — no slides, just your warehouse.">
<meta name="robots" content="noindex">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-ink.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-shadow-ink.png">
<link rel="apple-touch-icon" href="/assets/icon-shadow-ink.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css?v=2">

<!-- Calendly popup widget -->
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>

<style>
  .pk-sd-wrap {
    min-height: 100vh;
    background: var(--surface-dark);
    color: var(--on-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .pk-sd-inner { max-width: 560px; }
  .pk-sd-inner .pk-wordmark { justify-content: center; color: var(--on-dark); margin-bottom: 32px; }
  .pk-sd-eyebrow {
    display: block;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .pk-sd-inner h1 {
    font-family: "Fraunces", Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 640;
    color: var(--on-dark);
    font-size: clamp(32px, 6vw, 52px);
    line-height: 1.06;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
  }
  .pk-sd-inner p {
    color: var(--on-dark-muted);
    font-size: 17px;
    line-height: 1.55;
    margin: 0 0 30px;
  }
  .pk-sd-inner .pk-btn-onmoss { font-size: 16px; padding: 14px 24px; }
</style>
</head>
<body class="pk-page-schedule">

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-chev-r" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></symbol>
  </defs>
</svg>

<main class="pk-sd-wrap">
  <div class="pk-sd-inner">
    <a href="/" class="pk-wordmark lg" aria-label="Packr — home">
      <img src="/assets/icon-cream.png" alt="" class="pk-wordmark-icon">
      <span class="pk-wordmark-text">Packr</span>
    </a>
    <span class="pk-sd-eyebrow">Book a Demo</span>
    <h1>See it on your data</h1>
    <p>30 minutes. We'll plug into your WMS sandbox and walk your real numbers — no slides, just your warehouse.</p>
    <a href="https://calendly.com/packr-demo/30min" target="_blank" rel="noopener" class="pk-btn pk-btn-onmoss" id="sd-book">
      Book a Demo <svg class="ic" width="14" height="14"><use href="#i-chev-r"/></svg>
    </a>
  </div>
</main>

<script>
(() => {
  const CAL_URL = 'https://calendly.com/packr-demo/30min';

  // Open the Calendly popup as soon as the widget script is ready.
  let opened = false;
  const open = () => {
    if (opened || typeof Calendly === 'undefined') return;
    opened = true;
    Calendly.initPopupWidget({ url: CAL_URL });
  };

  // widget.js loads async, so poll briefly until Calendly is defined.
  const started = performance.now();
  const timer = setInterval(() => {
    if (typeof Calendly !== 'undefined') { clearInterval(timer); open(); }
    else if (performance.now() - started > 8000) { clearInterval(timer); } // give up quietly; button still works
  }, 100);

  // If the visitor closes the modal, the button below re-opens it.
  document.getElementById('sd-book').addEventListener('click', (e) => {
    if (typeof Calendly === 'undefined') return; // fall back to the normal link
    e.preventDefault();
    Calendly.initPopupWidget({ url: CAL_URL });
  });
})();
</script>

</body>
</html>
